<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Genova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="weather-app">
    <section class="weather-card">
      <div class="topbar">
        <div>
          <p class="eyebrow">Previsioni</p>
          <h1 id="cityName">Genova</h1>
        </div>
        <div class="badge" id="updatedAt">--:--</div>
      </div>

      <section class="current-weather">
        <div class="current-left">
          <div class="icon-big" id="currentIcon">☀️</div>
          <div>
            <p class="condition" id="currentCondition">Caricamento...</p>
            <p class="details" id="currentDetails">Attendi un momento</p>
          </div>
        </div>

        <div class="current-right">
          <div class="temp-now">
            <span id="currentTemp">--</span><span class="unit">°</span>
          </div>
        </div>
      </section>

      <section class="forecast-grid" id="forecastGrid">
        <!-- cards giorni generate da JS -->
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
